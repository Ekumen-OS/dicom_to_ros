services:
  sample_downloader:
    build:
      context: .
      dockerfile: docker/Dockerfile.downloader
    container_name: dicom_sample_downloader
    # user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./dicom_samples:/app/dicom_samples
    command: python3 download_samples.py

  dicom_listener:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    image: dicom_ros_image
    container_name: dicom_listener
    depends_on:
      sample_downloader:
        condition: service_completed_successfully
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1 
      
    volumes:
      - ./src:/ros2_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix:rw 
      
    command: /bin/bash -c "rm -rf build install log && source /opt/ros/humble/setup.bash && colcon build --symlink-install && source install/setup.bash && ros2 launch dicom_to_ros dicom_nodes.launch.py"

  rviz:
    image: dicom_ros_image
    container_name: dicom_rviz_pcl
    depends_on:
      - dicom_listener
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ./src:/ros2_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./rviz_config:/root/.rviz2
    network_mode: host
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute, graphics, video]
    command: /bin/bash -c "source /opt/ros/humble/setup.bash && ros2 run rviz2 rviz2"