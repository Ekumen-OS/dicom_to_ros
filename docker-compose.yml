services:
  dicom_node:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: dicom_ros_image
    container_name: dicom_adapter

    ports:
      - "11112:11112"
    
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1 
      
    volumes:
      - ./src:/ros2_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix:rw 
      
    command: /bin/bash -c "source /opt/ros/humble/setup.bash && source /ros2_ws/install/setup.bash && ros2 run dicom_to_ros dicom_listener"
